quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:soc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration,classpath:db/ledger/migration

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:soc-qhorus;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.flyway.qhorus.migrate-at-start=true
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration

quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,\
  io.casehub.work.runtime.filter,io.casehub.soc.domain,io.casehub.platform.memory.jpa
quarkus.hibernate-orm.database.generation=none

quarkus.arc.selected-alternatives=io.casehub.persistence.memory.MemoryPlanItemStore,\
  io.casehub.persistence.memory.InMemoryEventLogRepository,\
  io.casehub.persistence.memory.InMemoryCaseMetaModelRepository,\
  io.casehub.persistence.memory.InMemoryCaseInstanceRepository,\
  io.casehub.persistence.memory.MemorySubCaseGroupRepository

quarkus.arc.exclude-types=io.casehub.persistence.memory.DefaultTestPrincipal,\
  io.casehub.work.runtime.service.NoOpGroupMembershipProvider,\
  io.casehub.work.runtime.service.TenantScopedPrincipal
